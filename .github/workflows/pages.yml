│  │  ├─ models/              # SQLite 初始化和连接
│  │  ├─ prompts/             # OpenAI prompt 模板
│  │  ├─ schemas/             # Pydantic 请求和响应结构
│  │  ├─ services/            # 业务服务、评分、AI 客户端、工作流
│  │  └─ main.py              # FastAPI 应用入口
