services:
  - type: web
    name: xhs-agent-v3-backend
    env: python
    rootDir: backend
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: USE_MOCK_AI
        value: "true"
      - key: OPENAI_MODEL
        value: gpt-4.1-mini
      - key: OPENAI_TIMEOUT_SECONDS
        value: "30"
      - key: SAMPLE_DB_PATH
        value: /tmp/xhs-agent-v3.sqlite3
      - key: CORS_ORIGINS
        value: https://371373485-ops.github.io,http://localhost:5173,http://127.0.0.1:5173
